<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OpenHam 联机</title>
<style>
  html,body{height:100%;margin:0;background:#ffffff;color:#1d1d1f;
    font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;}
  #lobby{max-width:380px;margin:0 auto;padding:54px 24px;display:flex;flex-direction:column;gap:14px;}
  #logo{width:76px;height:76px;border-radius:20px;align-self:center;margin-bottom:4px;box-shadow:0 8px 26px rgba(0,0,0,.10);}
  h1{color:#1d1d1f;font-size:22px;font-weight:700;margin:2px 0 0;text-align:center;}
  .hint{color:#6e6e73;font-size:13px;text-align:center;line-height:1.6;margin-bottom:6px;}
  .field{position:relative;display:flex;}
  input{flex:1;width:100%;box-sizing:border-box;background:#ffffff;color:#1d1d1f;
    border:1px solid #d8d8dc;border-radius:11px;padding:14px 15px;font-size:16px;outline:none;
    transition:border-color .15s,box-shadow .15s;}
  input::placeholder{color:#a8a8ad;}
  input:focus{border-color:#6e56cf;box-shadow:0 0 0 3px rgba(110,86,207,.14);}
  #nick{padding-right:52px;}
  #dice{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:9px;
    background:#f5f5f6;border:none;font-size:19px;cursor:pointer;color:#1d1d1f;padding:0;
    display:flex;align-items:center;justify-content:center;transition:background .15s,transform .2s;}
  #dice:hover{background:#ececee;}
  #dice:active{transform:translateY(-50%) rotate(180deg) scale(.9);}
  #join{background:#1d1d1f;color:#fff;border:none;border-radius:11px;padding:15px;font-size:16px;font-weight:600;
    cursor:pointer;margin-top:4px;transition:background .15s;}
  #join:hover{background:#37373a;}
  #join:disabled{background:#ececee;color:#a8a8ad;cursor:default;}
  #status{color:#6e6e73;font-size:14px;text-align:center;min-height:20px;}
  #stage{position:fixed;inset:0;background:#1c1a14;display:none;}
  #game{width:100%;height:100%;border:none;}
  #bar{position:fixed;top:0;left:0;right:0;height:0;}
  /* 游戏内聊天浮层（与桌面端一致的浅色高级风 + 气泡 + 未读徽标） */
  #chatBtn{position:fixed;bottom:18px;left:18px;z-index:30;width:54px;height:54px;border-radius:16px;
    background:#ffffff;color:#1d1d1f;font-size:23px;border:1px solid #ececef;display:none;
    align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.16);transition:transform .15s cubic-bezier(.2,.8,.2,1),box-shadow .15s;}
  #chatBtn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 12px 28px rgba(0,0,0,.20);}
  #chatBtn:active{transform:scale(.95);}
  #chatBadge{position:absolute;top:-6px;right:-6px;min-width:21px;height:21px;padding:0 6px;border-radius:11px;
    background:#ff3b30;color:#fff;font:700 12px/21px -apple-system,sans-serif;text-align:center;display:none;
    box-shadow:0 2px 7px rgba(255,59,48,.45);border:2px solid #fff;}
  #chatPanel{position:fixed;bottom:84px;left:18px;z-index:30;width:min(88vw,344px);height:min(56vh,430px);
    background:rgba(255,255,255,.82);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);
    border:1px solid rgba(0,0,0,.06);border-radius:20px;display:none;flex-direction:column;overflow:hidden;
    box-shadow:0 24px 64px rgba(0,0,0,.22);animation:chatPop .22s cubic-bezier(.2,.9,.25,1);}
  @keyframes chatPop{from{opacity:0;transform:translateY(14px) scale(.96);}to{opacity:1;transform:none;}}
  #chatHead{padding:15px 18px 12px;font:700 15px/1 -apple-system,sans-serif;color:#1d1d1f;
    border-bottom:1px solid rgba(0,0,0,.06);}
  #chatLog{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;}
  #chatLog::-webkit-scrollbar{width:0;}
  .bub{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.45;word-break:break-word;
    box-shadow:0 1px 3px rgba(0,0,0,.08);animation:bubIn .18s ease;}
  @keyframes bubIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .bub .nm{display:block;font-size:11px;color:#8a8a8f;margin-bottom:2px;}
  .me{align-self:flex-end;background:#1d1d1f;color:#fff;border-bottom-right-radius:5px;}
  .other{align-self:flex-start;background:#f0f0f2;color:#1d1d1f;border-bottom-left-radius:5px;}
  .sysmsg{align-self:center;color:#a8a8ad;font-size:12px;padding:2px 0;}
  #chatRow{display:flex;gap:8px;padding:11px;border-top:1px solid rgba(0,0,0,.06);}
  #chatText{flex:1;background:#fff;border:1px solid #d8d8dc;border-radius:12px;
    color:#1d1d1f;padding:11px 14px;font-size:15px;outline:none;transition:border-color .15s;}
  #chatText:focus{border-color:#6e56cf;}
  #chatSend{background:#1d1d1f;border:none;color:#fff;font-weight:600;
    padding:0 18px;border-radius:12px;cursor:pointer;font-size:14px;}
</style>
</head>
<body>
  <div id="lobby">
    <img id="logo" src="https://openham.focus.beer/logo.png" alt="OpenHam">
    <h1>OpenHam 联机</h1>
    <div class="hint">输入房间口令，加入朋友的房间一起玩。<br>无需安装，浏览器直接玩。</div>
    <div class="field">
      <input id="nick" placeholder="你的昵称" autocomplete="off">
      <button id="dice" title="换一个昵称">🎲</button>
    </div>
    <input id="code" placeholder="粘贴口令 / 整段邀请文字（自动识别）" autocomplete="off">
    <button id="join">进入游戏</button>
    <div id="status"></div>
  </div>
  <div id="stage"><iframe id="game" sandbox="allow-scripts"></iframe></div>
  <button id="chatBtn">💬<span id="chatBadge"></span></button>
  <div id="chatPanel">
    <div id="chatHead">💬 房间聊天</div>
    <div id="chatLog"></div>
    <div id="chatRow"><input id="chatText" placeholder="发言…" autocomplete="off"><button id="chatSend">发送</button></div>
  </div>

<script>
// ── 喵咪密码解码 ──────────────────────────────────────────────
const MEOW = {"0":"喵喵","1":"喵咪","2":"喵呜","3":"喵嗷","4":"咪喵",
              "5":"咪咪","6":"咪呜","7":"咪嗷","8":"呜喵","9":"呜咪"};
const RMEOW = {}; for (const k in MEOW) RMEOW[MEOW[k]] = k;
function decodeMeow(s){
  s = (s||"").replace(/\s+/g,"");
  if (s.startsWith("喵～")) s = s.slice(2);
  if (s.endsWith("～喵")) s = s.slice(0,-2);
  if (s.length !== 12) throw new Error("口令长度不对");
  let out = "";
  for (let i=0;i<12;i+=2){ const t=s.substr(i,2); if(!(t in RMEOW)) throw new Error("无法识别的口令"); out+=RMEOW[t]; }
  return out;
}

// ── 工具 ──────────────────────────────────────────────────────
function b64ToU8(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
async function inflateRaw(u8){
  const ds=new DecompressionStream("deflate-raw");
  const ab=await new Response(new Response(u8).body.pipeThrough(ds)).arrayBuffer();
  return new Uint8Array(ab);
}
// 解析 Python zipfile(ZIP_DEFLATED) 生成的 zip：逐个本地文件头读取
async function unzip(buf){
  const dv=new DataView(buf), td=new TextDecoder(); let off=0; const files={};
  while (off+4 <= buf.byteLength){
    if (dv.getUint32(off,true) !== 0x04034b50) break;     // 到中央目录则停止
    const method=dv.getUint16(off+8,true);
    const compSize=dv.getUint32(off+18,true);
    const nameLen=dv.getUint16(off+26,true);
    const extraLen=dv.getUint16(off+28,true);
    const name=td.decode(new Uint8Array(buf,off+30,nameLen));
    const dataStart=off+30+nameLen+extraLen;
    const comp=new Uint8Array(buf,dataStart,compSize);
    files[name]= method===0 ? comp : await inflateRaw(comp);
    off=dataStart+compSize;
  }
  return files;
}

const $=id=>document.getElementById(id);
function setStatus(t){ $("status").textContent=t; }

// ── 主流程 ────────────────────────────────────────────────────
let ws=null, selfId=null, room=null, myNick="玩家";
let meta=null, parts={}, partCount=0;

$("join").onclick=connect;
$("code").addEventListener("keydown",e=>{ if(e.key==="Enter") connect(); });
// 支持链接带口令：?code=喵～…～喵
const qcode=new URLSearchParams(location.search).get("code");
if (qcode) $("code").value=qcode;

// ── 自动识别口令：从整段邀请文字里提取，并尽量静默嗅探剪贴板 ──
function extractCode(t){ const m=(t||"").match(/喵～[喵咪呜嗷]+～喵/); return m?m[0]:null; }
// 1) 粘贴任意位置：若含口令则只提取口令填入（http 也可用，无需权限）
document.addEventListener("paste", e=>{
  let t=""; try{ t=(e.clipboardData||window.clipboardData).getData("text"); }catch(_){}
  const c=extractCode(t);
  if (c){ e.preventDefault(); $("code").value=c; setStatus("已自动识别房间口令 ✅"); }
});
// 2) 静默嗅探剪贴板：仅在浏览器允许时(https/localhost)生效，失败则忽略
async function sniffClipboard(){
  if ($("code").value.trim()) return;
  try{ if (navigator.clipboard && navigator.clipboard.readText){
    const c=extractCode(await navigator.clipboard.readText());
    if (c){ $("code").value=c; setStatus("已自动识别房间口令 ✅"); }
  } }catch(_){}
}
sniffClipboard();
window.addEventListener("focus", sniffClipboard);                              // 从桌面复制后切回浏览器
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) sniffClipboard(); });
$("code").addEventListener("focus", sniffClipboard);

// 手机/浏览器用户自动生成一个随机昵称并预填（用户想改可直接改）
function randNick(){
  const a=['飞驰','闪电','无敌','狂野','钢铁','暴走','幸运','疾风','烈焰','冷酷','呆萌','旋风','沉默','贪吃'];
  const b=['车神','飞侠','老司机','骑士','旋风','菜鸟','赛车手','飞鱼','野兔','流星','闪客','小钢炮','胖达','柠檬'];
  return a[Math.floor(Math.random()*a.length)]+b[Math.floor(Math.random()*b.length)]+(Math.floor(Math.random()*90)+10);
}
if (!$("nick").value) $("nick").value=randNick();
$("dice").onclick=()=>{ $("nick").value=randNick(); $("nick").focus(); };   // 骰子→换一个随机昵称

function connect(){
  const nick=$("nick").value.trim()||randNick(); myNick=nick;
  let roomCode;
  try { roomCode=decodeMeow($("code").value); }
  catch(e){ setStatus("⚠️ "+e.message); return; }
  $("join").disabled=true; setStatus("正在连接…");

  ws=new WebSocket("ws://"+location.host+"/");
  ws.onopen=()=>{ ws.send(JSON.stringify({type:"join",room:roomCode,name:nick})); };
  ws.onmessage=ev=>onMsg(JSON.parse(ev.data));
  ws.onclose=()=>{ setStatus("连接已断开"); $("join").disabled=false; };
  ws.onerror=()=>{ setStatus("连接失败，检查网络或服务器"); $("join").disabled=false; };
}

function onMsg(m){
  if (m.type==="welcome") return;
  if (m.type==="joined"){
    selfId=m.self_id; room=m.room;
    $("chatBtn").style.display="block";
    setStatus("已进房，等待房主发布游戏…（房主请在电脑上点「发布游戏」）");
  } else if (m.type==="peer_join"){
    addChat(null, (m.name||"有人")+" 加入了房间");
  } else if (m.type==="peer_leave"){
    addChat(null, "有人离开了房间");
  } else if (m.type==="error"){
    setStatus("⚠️ "+(m.msg||m.code)); $("join").disabled=false;
  } else if (m.type==="relay"){
    const d=m.data||{};
    if (d.t==="game_meta"){ meta=d; parts={}; partCount=0; setStatus("正在接收游戏「"+d.name+"」…"); }
    else if (d.t==="game_chunk"){ onChunk(d); }
    else if (d.t==="game_msg"){ deliver(d.payload, m); }
    else if (d.t==="chat"){ addChat(m.name||"?", d.text); }
  }
}

// ── 游戏内聊天 ────────────────────────────────────────────────
let unread=0;
function setBadge(){ const b=$("chatBadge"); if(unread>0){ b.textContent=unread>99?"99+":unread; b.style.display="block"; } else b.style.display="none"; }
$("chatBtn").onclick=()=>{
  const p=$("chatPanel"); const show=p.style.display!=="flex";
  p.style.display=show?"flex":"none";
  if (show){ unread=0; setBadge(); $("chatText").focus(); }
};
$("chatSend").onclick=sendChat;
$("chatText").addEventListener("keydown",e=>{ if(e.key==="Enter") sendChat(); });
function sendChat(){
  const t=$("chatText").value.trim();
  if (!t || !ws || ws.readyState!==1) return;
  ws.send(JSON.stringify({type:"relay",data:{t:"chat",text:t}}));
  addChat("我",t,true); $("chatText").value="";
}
function esc(s){ return (s+"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }
function addChat(name,text,mine){
  const l=$("chatLog"); const d=document.createElement("div");
  if (name===null){ d.className="sysmsg"; d.textContent=text; }
  else if (mine){ d.className="bub me"; d.textContent=text; }
  else { d.className="bub other"; d.innerHTML='<span class="nm">'+esc(name)+'</span>'+esc(text); }
  l.appendChild(d); l.scrollTop=l.scrollHeight;
  if (name!==null && !mine && $("chatPanel").style.display!=="flex"){ unread++; setBadge(); }   // 未读徽标
}

async function onChunk(d){
  if (!meta) return;
  parts[d.seq]=d.b64; partCount++;
  setStatus("接收中 "+Math.round(partCount/meta.chunks*100)+"%");
  if (partCount>=meta.chunks){
    // 拼接 → zip 字节
    let total=0; const arrs=[];
    for (let i=0;i<meta.chunks;i++){ const u=b64ToU8(parts[i]); arrs.push(u); total+=u.length; }
    const zip=new Uint8Array(total); let o=0; for(const a of arrs){ zip.set(a,o); o+=a.length; }
    try { await runGame(zip.buffer); }
    catch(e){ setStatus("⚠️ 打开游戏失败："+e.message); }
  }
}

async function runGame(buf){
  const files=await unzip(buf);
  const td=new TextDecoder();
  let entry="index.html", name="游戏";
  if (files["manifest.json"]){ try{ const mf=JSON.parse(td.decode(files["manifest.json"])); entry=mf.entry||entry; name=mf.name||name; }catch(e){} }
  if (!files[entry]) throw new Error("缺少入口 "+entry);
  let html=td.decode(files[entry]);

  // 多文件：把其它资源做成 blob URL，替换 HTML 中对它们的引用（尽力而为）
  for (const fn in files){
    if (fn===entry || fn==="manifest.json") continue;
    const url=URL.createObjectURL(new Blob([files[fn]]));
    html=html.split('"'+fn+'"').join('"'+url+'"').split("'"+fn+"'").join("'"+url+"'");
  }

  // 引擎与统一输入层（与桌面端同形，从 ECS 加载）。放在最前，保证游戏脚本前就绪。
  const LIB="https://openham.focus.beer/lib";
  const libs=`<script src="${LIB}/phaser.min.js"><\/script><script src="${LIB}/openham_controls.js"><\/script>`;
  // 注入 OpenHam 桥（属性合并，和 openham_controls 的 OpenHam.input 共存）。iframe 与父页用 postMessage 通信
  const bridge=`<script>
    (function(){ var OH=window.OpenHam=window.OpenHam||{};
      OH.me=${JSON.stringify(selfId)}; OH.name=${JSON.stringify(myNick)}; OH.isHost=false; OH._cbs=OH._cbs||[];
      OH.send=function(o){ parent.postMessage({__oh:1,payload:o},"*"); };
      OH.on=function(cb){ this._cbs.push(cb); };
      window.addEventListener("message",function(e){ var d=e.data; if(!d||!d.__oh_in) return;
        var o=d.payload; if(o&&o.__oh){ if(OH._onmsg) OH._onmsg(o); return; }
        (window.OpenHam._cbs||[]).forEach(function(cb){ try{cb(o);}catch(err){console.error(err);} }); });
      document.addEventListener("DOMContentLoaded",function(){ if(OH._onready) OH._onready(); if (typeof window.OpenHamReady==="function") window.OpenHamReady(); });
    })();
  <\/script>`;
  $("game").srcdoc=libs+bridge+html;
  $("lobby").style.display="none";
  $("stage").style.display="block";
}

// iframe 游戏 → 父页（postMessage）→ relay
window.addEventListener("message",function(e){
  const d=e.data;
  if (d && d.__oh && ws && ws.readyState===1)
    ws.send(JSON.stringify({type:"relay",data:{t:"game_msg",payload:d.payload}}));
});
// relay → iframe 游戏（postMessage）。附带发送者 _from(昵称)/_id(玩家id)
function deliver(payload, m){
  const w=$("game").contentWindow;
  if (!w) return;
  let p=payload;
  if (p && typeof p==="object") p=Object.assign({},p,{_from:m&&m.name,_id:m&&m.from});
  w.postMessage({__oh_in:1,payload:p},"*");
}
</script>
</body>
</html>
