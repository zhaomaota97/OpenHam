<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>弹球对战</title>
<style>html,body{margin:0;height:100%;background:#101216;overflow:hidden}</style>
</head>
<body>
<script>
// 双人弹球对战（Pong）—— OpenHam 联机示范游戏
// 房主裁判：房主跑物理并广播状态，非房主发输入+渲染。手机用虚拟摇杆上下控制球拍。
const W = 800, H = 450, PW = 14, PH = 92, BR = 10, PAD = 26, SPD = 430, WIN = 5;
let scene, gL, gR, gBall, scoreTxt, msgTxt;
let state = { lY: H / 2, rY: H / 2, bx: W / 2, by: H / 2, bvx: 0, bvy: 0, sL: 0, sR: 0, started: false };
let inputs = {};   // id -> dir(-1..1)，房主收集
let mySide = -1;   // 0=左,1=右,>=2 观战

function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }

function resetBall(dir) {
  state.bx = W / 2; state.by = H / 2;
  const a = Math.random() * 0.6 - 0.3;
  state.bvx = dir * SPD * Math.cos(a); state.bvy = SPD * Math.sin(a);
}
function fullReset() {
  state.sL = 0; state.sR = 0; state.lY = H / 2; state.rY = H / 2;
  state.started = OpenHam.players.length >= 2;
  resetBall(Math.random() < 0.5 ? -1 : 1);
}

function create() {
  scene = this;
  this.add.rectangle(W / 2, H / 2, 4, H, 0x222831);
  gL = this.add.rectangle(PAD, H / 2, PW, PH, 0x6ca9ff);
  gR = this.add.rectangle(W - PAD, H / 2, PW, PH, 0xff8a6c);
  gBall = this.add.circle(W / 2, H / 2, BR, 0xffffff);
  scoreTxt = this.add.text(W / 2, 26, '0 : 0', { fontSize: '30px', color: '#cfd6e0' }).setOrigin(0.5);
  msgTxt = this.add.text(W / 2, H / 2, '', { fontSize: '22px', color: '#9aa3b0' }).setOrigin(0.5);
  this.add.text(12, 12, '↻ 重新开始', { fontSize: '17px', backgroundColor: '#222831', color: '#fff', padding: 7 })
    .setInteractive({ useHandCursor: true }).setDepth(99)
    .on('pointerdown', () => OpenHam.send({ t: 'reset' }));

  OpenHam.input.enable({ joystick: true, buttons: [] });   // 上下移动球拍（手机摇杆/电脑↑↓）
  OpenHam.onInput((id, inp) => { inputs[id] = inp.dir || 0; });
  OpenHam.onState((s) => { state = s; });
  OpenHam.onJoin(() => { if (OpenHam.isHost) { if (!state.started && OpenHam.players.length >= 2) fullReset(); OpenHam.syncState(state); } });
  OpenHam.on((o) => { if (o && o.t === 'reset' && OpenHam.isHost) fullReset(); });
  window.OpenHamReady = function () { if (OpenHam.isHost) fullReset(); };
}

function update(time, dt) {
  const ps = OpenHam.players;
  mySide = ps.findIndex((p) => p.id === OpenHam.me);
  const dir = OpenHam.input.y;   // -1 上, 1 下

  if (OpenHam.isHost) {
    inputs[OpenHam.me] = dir;
    if (state.started) {
      const dL = ps[0] ? (inputs[ps[0].id] || 0) : 0;
      const dR = ps[1] ? (inputs[ps[1].id] || 0) : 0;
      state.lY = clamp(state.lY + dL * SPD * dt / 1000, PH / 2, H - PH / 2);
      state.rY = clamp(state.rY + dR * SPD * dt / 1000, PH / 2, H - PH / 2);
      state.bx += state.bvx * dt / 1000; state.by += state.bvy * dt / 1000;
      if (state.by < BR) { state.by = BR; state.bvy = Math.abs(state.bvy); }
      if (state.by > H - BR) { state.by = H - BR; state.bvy = -Math.abs(state.bvy); }
      // 撞拍：反弹 + 加速 + 带角度
      if (state.bvx < 0 && state.bx < PAD + PW / 2 + BR && Math.abs(state.by - state.lY) < PH / 2 + BR) {
        state.bx = PAD + PW / 2 + BR; state.bvx = Math.abs(state.bvx) * 1.07; state.bvy += (state.by - state.lY) * 3.2;
      }
      if (state.bvx > 0 && state.bx > W - PAD - PW / 2 - BR && Math.abs(state.by - state.rY) < PH / 2 + BR) {
        state.bx = W - PAD - PW / 2 - BR; state.bvx = -Math.abs(state.bvx) * 1.07; state.bvy += (state.by - state.rY) * 3.2;
      }
      if (state.bx < -BR) { state.sR++; if (state.sR >= WIN) state.started = false; else resetBall(1); }
      if (state.bx > W + BR) { state.sL++; if (state.sL >= WIN) state.started = false; else resetBall(-1); }
    }
    OpenHam.syncState(state);
  } else {
    OpenHam.sendInput({ dir: dir });
  }
  render();
}

function render() {
  if (!gL) return;
  gL.y = state.lY; gR.y = state.rY; gBall.x = state.bx; gBall.y = state.by;
  scoreTxt.setText(state.sL + ' : ' + state.sR);
  let m = '';
  if (OpenHam.players.length < 2) m = '等待对手加入…';
  else if (!state.started) {
    if (state.sL >= WIN) m = '左方获胜！点「重新开始」';
    else if (state.sR >= WIN) m = '右方获胜！点「重新开始」';
    else m = '准备…';
  } else if (mySide >= 2) m = '观战中';
  msgTxt.setText(m);
}

new Phaser.Game({
  type: Phaser.AUTO, parent: document.body,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: W, height: H },
  backgroundColor: '#101216', scene: { create, update },
});
</script>
</body>
</html>
