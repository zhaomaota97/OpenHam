<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>霓虹对线 · 神射手</title>
<style>html,body{margin:0;height:100%;background:#070a12;overflow:hidden}</style>
</head>
<body>
<script>
/* 霓虹对线 · 神射手 —— OpenHam 1v1 MOBA 对线示范（简化版 EZ）
   房主裁判：房主跑全部物理/兵线/防御塔/技能/结算并广播 state，非房主发输入 + 照 state 渲染。
   玩法：补刀小兵攒金币→升级变强→用兵线推塔，先拆掉对面防御塔者获胜。
   操控：移动=摇杆/WASD（朝移动方向瞄准）；普攻=自动补最近残血兵/推塔；
        Q神射手=朝向直线技；E奥术跃迁=向前闪现；R精准弹幕=横贯全场的大招光束。*/
const W = 1600, H = 900, LANE_Y = H/2, MARGIN = 24;
const BLUE = 0x4ad6ff, RED = 0xff5c7a, NEUT = 0xb9c4e6;
const TICK_HZ = 30;                         // 状态广播频率（物理每帧跑，广播限频，省带宽）
// 单位/塔/小兵参数
const CSPD = 330, CR = 22, ATK_RANGE = 360, ATK_CD = 0.6, GOAL_HINT = 0;
const TOWER = { hp: 1700, range: 300, dmg: 80, cd: 0.85, r: 34 };
const MIN = { hp: 90, dmg: 10, cd: 1.0, spd: 95, aggro: 230, atk: 62, r: 13, bounty: 24 };
const WAVE_T = 13, WAVE_N = 4, MIN_CAP = 11;
// 技能
const Q = { cd: 3.0, spd: 1250, dmg: 30, adr: 1.0, life: 1.1, r: 16 };   // dmg + adr*AD
const E = { cd: 6.0, dist: 250 };
const R = { cd: 22, dmg: 120, adr: 1.6, half: 30, life: 0.22 };
const BASIC_AD_R = 1.0;                     // 普攻 = AD * 系数
const KILL_BOUNTY = 160, GOLD_TRICKLE = 2;  // 每秒被动金币
const RESP_BASE = 5;

let scene, mIdC = 1, bIdC = 1, sinceSync = 0;
let state = { champs:{}, minions:[], bolts:[], towers:{}, wave:WAVE_T, started:false, winner:null };
let inputs = {};                 // 房主：id -> 输入
const prevDown = {};             // 房主：技能按键边沿检测
// 渲染层
let g, champSpr = {}, msgTxt, hudL, hudR, abilTxt = [], boom = {}, prevAlive = {}, seenBeam = {}, prevMin = {};

function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function rnd(a,b){ return a + Math.random()*(b-a); }
function hx(c){ return '#' + c.toString(16).padStart(6,'0'); }
function pointSeg(px,py, ax,ay,bx,by){ const dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy||1;
  let t=clamp(((px-ax)*dx+(py-ay)*dy)/L2,0,1); return Math.hypot(px-(ax+dx*t), py-(ay+dy*t)); }
function eside(s){ return s==='b'?'r':'b'; }
function fwd(s){ return s==='b'?1:-1; }
function baseX(s){ return s==='b'?70:W-70; }
function towerX(s){ return s==='b'?330:W-330; }

/* ---------- 运行时生成贴图（无任何外链） ---------- */
function makeTextures(s){
  let q = s.make.graphics({ add:false });
  q.fillStyle(0xffffff,0.22); q.fillCircle(8,8,8);
  q.fillStyle(0xffffff,0.5);  q.fillCircle(8,8,5);
  q.fillStyle(0xffffff,1);    q.fillCircle(8,8,2.6);
  q.generateTexture('spark',16,16); q.destroy();
  q = s.make.graphics({ add:false });
  for(let r=32;r>=2;r-=2){ q.fillStyle(0xffffff,0.05); q.fillCircle(32,32,r); }
  q.generateTexture('glow',64,64); q.destroy();
  q = s.make.graphics({ add:false });
  q.fillStyle(0xffffff,1); q.fillTriangle(50,20, 8,4, 8,36);
  q.fillStyle(0x000000,0.28); q.fillTriangle(50,20, 8,12, 8,28);
  q.generateTexture('ship',56,40); q.destroy();
  q = s.make.graphics({ add:false });
  for(let i=0;i<160;i++){ q.fillStyle(0xffffff, rnd(0.2,0.7)); q.fillCircle(rnd(0,420), rnd(0,420), rnd(0.6,1.6)); }
  q.generateTexture('stars',420,420); q.destroy();
}

function create(){
  scene = this;
  makeTextures(this);
  this.add.tileSprite(W/2,H/2,W,H,'stars').setDepth(-20).setAlpha(0.7);

  // 场景底图：对线走廊 + 两侧基地色块（静态绘制一次）
  const bg = this.add.graphics().setDepth(-10);
  bg.fillStyle(BLUE,0.06).fillRect(MARGIN, MARGIN, 420, H-2*MARGIN);
  bg.fillStyle(RED,0.06).fillRect(W-MARGIN-420, MARGIN, 420, H-2*MARGIN);
  bg.lineStyle(2, 0x223052, 0.8).strokeRect(MARGIN, MARGIN, W-2*MARGIN, H-2*MARGIN);
  bg.fillStyle(0x121a2e, 0.7).fillRect(MARGIN, LANE_Y-150, W-2*MARGIN, 300);   // 对线带
  bg.lineStyle(1, 0x1b2742, 0.7);
  bg.lineBetween(MARGIN, LANE_Y-150, W-MARGIN, LANE_Y-150);
  bg.lineBetween(MARGIN, LANE_Y+150, W-MARGIN, LANE_Y+150);

  g = this.add.graphics().setDepth(5);   // 动态层：小兵/塔/血条/子弹/HUD 框

  boom.b = this.add.particles(0,0,'spark',{ lifespan:{min:300,max:700}, speed:{min:140,max:480},
    scale:{start:1,end:0}, alpha:{start:1,end:0}, blendMode:'ADD', tint:BLUE, emitting:false }).setDepth(60);
  boom.r = this.add.particles(0,0,'spark',{ lifespan:{min:300,max:700}, speed:{min:140,max:480},
    scale:{start:1,end:0}, alpha:{start:1,end:0}, blendMode:'ADD', tint:RED, emitting:false }).setDepth(60);

  hudL = this.add.text(MARGIN+14, 16, '', { fontSize:'30px', fontStyle:'bold', color:hx(BLUE) }).setDepth(100);
  hudR = this.add.text(W-MARGIN-14, 16, '', { fontSize:'30px', fontStyle:'bold', color:hx(RED) }).setOrigin(1,0).setDepth(100);
  msgTxt = this.add.text(W/2, H/2-40, '', { fontSize:'46px', fontStyle:'bold', color:'#e6ecff', align:'center' }).setOrigin(0.5).setDepth(100);
  for(let i=0;i<4;i++) abilTxt.push(this.add.text(0,0,'',{ fontSize:'22px', fontStyle:'bold', color:'#dfe7ff', align:'center' }).setOrigin(0.5).setDepth(101));

  this.add.text(28, H-60, '↻ 重新开始', { fontSize:'28px', backgroundColor:'#1a2440', color:'#cfe0ff', padding:12 })
    .setInteractive({ useHandCursor:true }).setDepth(999)
    .on('pointerdown', () => OpenHam.send({ t:'reset' }));
  this.add.text(W/2, 20, '电脑：WASD/方向键 移动 · 空格=普攻 · J=Q · K=E · L=R',
    { fontSize:'20px', color:'#5b6a93' }).setOrigin(0.5,0).setDepth(100);

  // 跨平台输入：移动 + 4 个技能键（手机出摇杆+按钮；电脑 WASD/方向键 + 空格/J/K/L）
  OpenHam.input.enable({ joystick:true, buttons:['普攻','Q','E','R'] });
  OpenHam.onInput((id, inp) => { inputs[id] = inp; });
  OpenHam.onState((s) => { state = s; });
  OpenHam.onJoin(() => { if(OpenHam.isHost){ if(!state.started && OpenHam.players.length>=2) fullReset(); OpenHam.syncState(state); } });
  OpenHam.on((o) => { if(o && o.t==='reset' && OpenHam.isHost) fullReset(); });
  window.OpenHamReady = function(){ if(OpenHam.isHost) fullReset(); };
}

/* ===================== 房主逻辑 ===================== */
function newChamp(side){
  return { x: side==='b'? 150 : W-150, y: LANE_Y, a: side==='b'?0:Math.PI,
           hp:560, mh:560, ad:16, lv:1, g:0, al:true, rt:0, s:side,
           cq:0, ce:0, cr:0, ac:0 };
}
function seats(){
  const ps = OpenHam.players.slice(0,2);
  ps.forEach((p,i) => { const side = i===0?'b':'r';
    if(!state.champs[p.id]) state.champs[p.id] = newChamp(side);
    else state.champs[p.id].s = side; });
  const ids = ps.map(p=>p.id);
  for(const id in state.champs){ if(ids.indexOf(id)<0) delete state.champs[id]; }
}
function fullReset(){
  seats();
  for(const id in state.champs){ state.champs[id] = newChamp(state.champs[id].s); }
  state.minions = []; state.bolts = [];
  state.towers = { b:{x:towerX('b'),y:LANE_Y,hp:TOWER.hp,mh:TOWER.hp,cd:0,s:'b'},
                   r:{x:towerX('r'),y:LANE_Y,hp:TOWER.hp,mh:TOWER.hp,cd:0,s:'r'} };
  state.wave = 2.5; state.winner = null;
  state.started = OpenHam.players.length >= 2;
}
function champById(id){ return state.champs[id]; }
function sideChamp(side){ for(const id in state.champs){ if(state.champs[id].s===side) return {id, c:state.champs[id]}; } return null; }
function nameOf(id){ const p = OpenHam.players.find(p=>p.id===id); return p?p.name:'玩家'; }

function levelUp(c){
  const want = Math.min(12, 1 + Math.floor(c.g/100));
  while(c.lv < want){ c.lv++; c.mh += 70; c.hp += 70; c.ad += 6; }
}
function spawnWave(){
  ['b','r'].forEach(side => {
    let alive = state.minions.filter(m=>m.s===side).length;
    for(let k=0;k<WAVE_N && alive<MIN_CAP; k++, alive++){
      state.minions.push({ i:mIdC++, x: baseX(side)+fwd(side)*(60+k*46), y: LANE_Y + (k-1.5)*40,
        h:MIN.hp, mh:MIN.hp, s:side, cd:0 });
    }
  });
}
// 给某单位造成伤害；src 为造成伤害的英雄 id（用于补刀给金）。返回是否击杀
function hurtMinion(m, dmg, srcId){
  if(m.h <= 0) return false;             // 已死的兵本帧不再结算，避免重复给金
  m.h -= dmg;
  if(m.h <= 0){ if(srcId){ const c=champById(srcId); if(c){ c.g += MIN.bounty; } } return true; }
  return false;
}

function hostStep(dt){
  seats();
  inputs[OpenHam.me] = readLocalInput();
  if(!state.started) return;

  // 被动金币 + 出兵
  for(const id in state.champs){ if(state.champs[id].al) state.champs[id].g += GOLD_TRICKLE*dt; levelUp(state.champs[id]); }
  state.wave -= dt; if(state.wave<=0){ state.wave = WAVE_T; spawnWave(); }

  // ---- 英雄 ----
  for(const id in state.champs){
    const c = state.champs[id];
    c.cq=Math.max(0,c.cq-dt); c.ce=Math.max(0,c.ce-dt); c.cr=Math.max(0,c.cr-dt); c.ac=Math.max(0,c.ac-dt);
    if(!c.al){ c.rt-=dt; if(c.rt<=0){ c.al=true; c.hp=c.mh; c.x=(c.s==='b'?150:W-150); c.y=LANE_Y; } continue; }
    const in_ = inputs[id] || {x:0,y:0,a:false,q:false,e:false,r:false};
    const mag = Math.hypot(in_.x,in_.y);
    if(mag>0.15){ c.x += in_.x*CSPD*dt; c.y += in_.y*CSPD*dt; c.a = Math.atan2(in_.y,in_.x); }
    c.x = clamp(c.x, MARGIN+CR, W-MARGIN-CR); c.y = clamp(c.y, MARGIN+CR, H-MARGIN-CR);
    // 技能边沿
    const pd = prevDown[id] || {q:false,e:false,r:false};
    if(in_.q && !pd.q && c.cq<=0){ c.cq=Q.cd;
      state.bolts.push({ i:bIdC++, k:'q', x:c.x+Math.cos(c.a)*26, y:c.y+Math.sin(c.a)*26,
        a:c.a, s:c.s, o:id, dmg:Q.dmg + c.ad*Q.adr, life:Q.life }); }
    if(in_.e && !pd.e && c.ce<=0){ c.ce=E.cd;
      c.x = clamp(c.x+Math.cos(c.a)*E.dist, MARGIN+CR, W-MARGIN-CR);
      c.y = clamp(c.y+Math.sin(c.a)*E.dist, MARGIN+CR, H-MARGIN-CR); }
    if(in_.r && !pd.r && c.cr<=0){ c.cr=R.cd; castBeam(c, id); }
    prevDown[id] = { q:in_.q, e:in_.e, r:in_.r };
    // 普攻（按住自动，冷却到了就打）：优先补最近残血兵，其次塔，其次敌方英雄
    if(in_.a && c.ac<=0){ basicAttack(c, id); }
  }

  // ---- 小兵 ----
  for(const m of state.minions){
    m.cd = Math.max(0, m.cd-dt);
    const en = eside(m.s);
    // 找最近敌方小兵
    let tgt=null, td=1e9;
    for(const o of state.minions){ if(o.s!==en||o.h<=0) continue; const d=dist(m.x,m.y,o.x,o.y); if(d<td){td=d;tgt=o;} }
    const tw = state.towers[en];
    if(tgt && td<MIN.aggro){
      if(td>MIN.atk){ const ang=Math.atan2(tgt.y-m.y,tgt.x-m.x); m.x+=Math.cos(ang)*MIN.spd*dt; m.y+=Math.sin(ang)*MIN.spd*dt; }
      else if(m.cd<=0){ m.cd=MIN.cd; hurtMinion(tgt, MIN.dmg, null); }
    } else if(tw && tw.hp>0 && Math.abs(m.x-tw.x)<MIN.atk+10 && Math.abs(m.y-tw.y)<120){
      if(m.cd<=0){ m.cd=MIN.cd; tw.hp-=MIN.dmg; if(tw.hp<=0) winBy(eside(en)); }
    } else {
      m.x += fwd(m.s)*MIN.spd*dt; m.y += (LANE_Y + 0 - m.y)*Math.min(1, dt*1.5);
    }
  }

  // ---- 防御塔 ----
  for(const side of ['b','r']){
    const tw = state.towers[side]; if(!tw || tw.hp<=0) continue;
    tw.cd = Math.max(0, tw.cd-dt); if(tw.cd>0) continue;
    const en = eside(side);
    // 先打范围内最近敌方小兵，没有就打范围内敌方英雄
    let tgt=null, td=TOWER.range;
    for(const m of state.minions){ if(m.s!==en||m.h<=0) continue; const d=dist(tw.x,tw.y,m.x,m.y); if(d<td){td=d;tgt={m};} }
    if(!tgt){ const ec=sideChamp(en); if(ec && ec.c.al && dist(tw.x,tw.y,ec.c.x,ec.c.y)<TOWER.range){ tgt={c:ec.c}; } }
    if(tgt){ tw.cd=TOWER.cd;
      if(tgt.m){ tgt.m.h-=TOWER.dmg; state.bolts.push({i:bIdC++,k:'atk',x:tw.x,y:tw.y,tx:tgt.m.x,ty:tgt.m.y,s:side,life:0.12}); }
      else { damageChamp(tgt.c, TOWER.dmg, null); state.bolts.push({i:bIdC++,k:'atk',x:tw.x,y:tw.y,tx:tgt.c.x,ty:tgt.c.y,s:side,life:0.12}); }
    }
  }

  // ---- 子弹（Q 飞行 + 命中） ----
  const keep=[];
  for(const b of state.bolts){
    b.life-=dt;
    if(b.k==='q'){
      b.x+=Math.cos(b.a)*Q.spd*dt; b.y+=Math.sin(b.a)*Q.spd*dt;
      if(b.life<=0 || b.x<MARGIN||b.x>W-MARGIN||b.y<MARGIN||b.y>H-MARGIN) continue;
      let hit=false; const en=eside(b.s);
      for(const m of state.minions){ if(m.s!==en) continue; if(dist(b.x,b.y,m.x,m.y)<Q.r+MIN.r){ hurtMinion(m,b.dmg,b.o); hit=true; break; } }
      if(!hit){ const ec=sideChamp(en); if(ec && ec.c.al && dist(b.x,b.y,ec.c.x,ec.c.y)<Q.r+CR){ damageChamp(ec.c,b.dmg,b.o); hit=true;
        const me=champById(b.o); if(me){ me.ce=Math.max(0,me.ce-1.5); me.cr=Math.max(0,me.cr-1.5); } } }
      if(!hit){ const tw=state.towers[en]; if(tw&&tw.hp>0&&dist(b.x,b.y,tw.x,tw.y)<Q.r+TOWER.r){ tw.hp-=b.dmg; if(tw.hp<=0) winBy(eside(en)); hit=true; } }
      if(!hit) keep.push(b);
    } else { if(b.life>0) keep.push(b); }   // atk/beam 只是短命视觉
  }
  state.bolts = keep;

  state.minions = state.minions.filter(m=>m.h>0);   // 本帧统一清死兵（避免重复结算/给金）
}

function basicAttack(c, id){
  const en = eside(c.s);
  // 1) 最近残血敌兵（射程内，残血优先做补刀）
  let mt=null, best=1e9;
  for(const m of state.minions){ if(m.s!==en) continue; if(dist(c.x,c.y,m.x,m.y)<ATK_RANGE){ if(m.h<best){best=m.h;mt=m;} } }
  let tx,ty;
  const dmg = c.ad*BASIC_AD_R;
  if(mt){ hurtMinion(mt,dmg,id); tx=mt.x; ty=mt.y; }
  else {
    const ec=sideChamp(en);
    const tw=state.towers[en];
    if(tw && tw.hp>0 && dist(c.x,c.y,tw.x,tw.y)<ATK_RANGE && !(ec&&ec.c.al&&dist(c.x,c.y,ec.c.x,ec.c.y)<ATK_RANGE)){
      tw.hp-=dmg; if(tw.hp<=0) winBy(eside(en)); tx=tw.x; ty=tw.y;
    } else if(ec && ec.c.al && dist(c.x,c.y,ec.c.x,ec.c.y)<ATK_RANGE){
      damageChamp(ec.c,dmg,id); tx=ec.c.x; ty=ec.c.y;
    } else return;   // 射程内无目标，不进入冷却
  }
  c.ac = ATK_CD;
  state.bolts.push({ i:bIdC++, k:'atk', x:c.x, y:c.y, tx, ty, s:c.s, life:0.1 });
}
function castBeam(c, id){
  const len = 1700;
  state.bolts.push({ i:bIdC++, k:'beam', x:c.x, y:c.y, a:c.a, len, s:c.s, life:R.life });
  const ex=c.x+Math.cos(c.a)*len, ey=c.y+Math.sin(c.a)*len, dmg=R.dmg + c.ad*R.adr, en=eside(c.s);
  for(const m of state.minions){ if(m.s!==en) continue; if(pointSeg(m.x,m.y,c.x,c.y,ex,ey)<R.half+MIN.r) hurtMinion(m,dmg,id); }
  const ec=sideChamp(en); if(ec&&ec.c.al && pointSeg(ec.c.x,ec.c.y,c.x,c.y,ex,ey)<R.half+CR) damageChamp(ec.c,dmg,id);
}
function damageChamp(c, dmg, srcId){
  c.hp -= dmg;
  if(c.hp<=0){ c.al=false; c.rt = RESP_BASE + c.lv*0.6;
    if(srcId){ const k=champById(srcId); if(k){ k.g += KILL_BOUNTY; } } }
}
function winBy(side){ if(state.winner!=null) return; state.winner = side; state.started = false; }

function readLocalInput(){
  return { x:OpenHam.input.x, y:OpenHam.input.y,
           a:OpenHam.input.down('普攻'), q:OpenHam.input.down('Q'),
           e:OpenHam.input.down('E'), r:OpenHam.input.down('R') };
}

/* ===================== 渲染（所有人） ===================== */
function myChamp(){ return state.champs[OpenHam.me] || null; }
function mySide(){ const c=myChamp(); return c?c.s:'b'; }
function barCol(side){ return side===mySide() ? 0x57e08a : 0xff5b6e; }

function ensureChampSpr(id){
  if(champSpr[id]) return champSpr[id];
  const glow = scene.add.image(0,0,'glow').setBlendMode(Phaser.BlendModes.ADD).setScale(2.4).setDepth(8);
  const img  = scene.add.image(0,0,'ship').setScale(1.05).setDepth(10);
  const lab  = scene.add.text(0,0,'',{ fontSize:'22px', fontStyle:'bold' }).setOrigin(0.5).setDepth(11);
  return (champSpr[id] = { glow, img, lab });
}
function hpbar(x,y,w,h,frac,col){
  g.fillStyle(0x000000,0.55).fillRect(x-w/2-2, y-2, w+4, h+4);
  g.fillStyle(0x2a2f3a,1).fillRect(x-w/2, y, w, h);
  g.fillStyle(col,1).fillRect(x-w/2, y, w*clamp(frac,0,1), h);
}

function render(){
  g.clear();

  // 防御塔
  for(const side of ['b','r']){
    const tw=state.towers[side]; if(!tw) continue; const col=side==='b'?BLUE:RED;
    if(tw.hp>0){
      g.fillStyle(0x0b1020,1).fillCircle(tw.x,tw.y,TOWER.r+6);
      g.lineStyle(3,col,0.9).strokeCircle(tw.x,tw.y,TOWER.r+6);
      g.fillStyle(col,0.9).fillCircle(tw.x,tw.y,TOWER.r-6);
      g.lineStyle(1,col,0.18).strokeCircle(tw.x,tw.y,TOWER.range);
      hpbar(tw.x, tw.y-TOWER.r-26, 120, 12, tw.hp/tw.mh, barCol(side));
    } else {
      g.lineStyle(3,0x3a3f4a,0.7).strokeCircle(tw.x,tw.y,TOWER.r+6);
    }
  }

  // 小兵
  for(const m of state.minions){
    const col = m.s==='b'?BLUE:RED;
    g.fillStyle(col,1).fillCircle(m.x,m.y,MIN.r);
    g.fillStyle(0xffffff,0.5).fillCircle(m.x-3,m.y-3,3);
    hpbar(m.x, m.y-MIN.r-12, 30, 5, m.h/m.mh, barCol(m.s));
  }
  // 小兵死亡碎屑
  const nowMin = {}; state.minions.forEach(m=>nowMin[m.i]=m);
  for(const i in prevMin){ if(!nowMin[i]){ const m=prevMin[i]; boom[m.s].explode(6, m.x, m.y); } }
  prevMin = nowMin;

  // 子弹 / 技能特效
  for(const b of state.bolts){
    const col = b.s==='b'?BLUE:RED;
    if(b.k==='q'){ g.fillStyle(col,0.3).fillCircle(b.x,b.y,15); g.fillStyle(0xffffff,1).fillCircle(b.x,b.y,5); }
    else if(b.k==='atk'){ g.lineStyle(3,col,0.85).lineBetween(b.x,b.y,b.tx,b.ty); }
    else if(b.k==='beam'){ const ex=b.x+Math.cos(b.a)*b.len, ey=b.y+Math.sin(b.a)*b.len;
      g.lineStyle(R.half*2,col,0.18).lineBetween(b.x,b.y,ex,ey);
      g.lineStyle(R.half,col,0.4).lineBetween(b.x,b.y,ex,ey);
      g.lineStyle(8,0xffffff,0.95).lineBetween(b.x,b.y,ex,ey);
      if(!seenBeam[b.i]){ seenBeam[b.i]=1; scene.cameras.main.shake(180,0.012); } }
  }

  // 英雄
  for(const id in state.champs){
    const c=state.champs[id], col=c.s==='b'?BLUE:RED, sp=ensureChampSpr(id);
    sp.glow.setPosition(c.x,c.y).setTint(col).setVisible(c.al).setAlpha(c.al?0.55:0);
    sp.img.setPosition(c.x,c.y).setRotation(c.a).setTint(c.al?col:0x39435e).setAlpha(c.al?1:0.25);
    sp.lab.setPosition(c.x,c.y-44).setText('Lv'+c.lv+' '+nameOf(id)).setColor(hx(col)).setAlpha(c.al?0.95:0.4);
    if(c.al) hpbar(c.x, c.y+30, 84, 9, c.hp/c.mh, barCol(c.s));
    const pa=prevAlive[id];
    if(pa===true && !c.al){ boom[c.s].explode(34,c.x,c.y); scene.cameras.main.shake(240,0.014); }
    prevAlive[id]=c.al;
  }
  for(const id in champSpr){ if(!state.champs[id]){ const s=champSpr[id]; s.glow.destroy(); s.img.destroy(); s.lab.destroy(); delete champSpr[id]; } }

  // 顶部 HUD（金币/等级/塔血）
  const bc=sideChamp('b'), rc=sideChamp('r');
  hudL.setText(bc ? (nameOf(bc.id)+'  Lv'+bc.c.lv+'  💰'+Math.floor(bc.c.g)) : '蓝方 等待…');
  hudR.setText(rc ? (nameOf(rc.id)+'  Lv'+rc.c.lv+'  💰'+Math.floor(rc.c.g)) : '红方 等待…');

  // 底部技能冷却 HUD（只显示自己）
  const me=myChamp();
  const labels=['普攻','Q','E','R'], cds = me?[0,me.cq,me.ce,me.cr]:[0,0,0,0];
  for(let i=0;i<4;i++){
    const bx=W/2-260+i*170, by=H-66, bw=150, bh=58;
    const ready = !me || cds[i]<=0;
    g.fillStyle(0x0c1326, 0.92).fillRect(bx,by,bw,bh);
    g.lineStyle(2, ready?0x5cc8ff:0x39435e, 0.9).strokeRect(bx,by,bw,bh);
    if(!ready){ g.fillStyle(0x000000,0.5).fillRect(bx,by,bw,bh); }
    abilTxt[i].setVisible(!!me).setPosition(bx+bw/2, by+bh/2)
      .setText(ready ? labels[i] : labels[i]+'  '+cds[i].toFixed(1)+'s')
      .setColor(ready?'#dfe7ff':'#8b97b8');
  }

  // 中央提示
  let m='';
  if(OpenHam.players.length<2) m='等待对手加入…\n把口令发给朋友 1v1 对线';
  else if(!state.started && state.winner!=null) m=(state.winner==='b'?'🏆 蓝方':'🏆 红方')+' 摧毁了对方防御塔，获胜！\n点「重新开始」再来';
  else if(!state.started) m='准备…';
  msgTxt.setText(m);
}

function update(time, dtms){
  const dt=Math.min(0.05,(dtms||16)/1000);
  if(OpenHam.isHost){
    hostStep(dt);
    sinceSync += dt;
    if(sinceSync >= 1/TICK_HZ){ sinceSync=0; OpenHam.syncState(state); }
  } else {
    OpenHam.sendInput(readLocalInput());
  }
  render();
}

new Phaser.Game({
  type: Phaser.AUTO, parent: document.body,
  scale:{ mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH, width:W, height:H, autoRound:false },
  render:{ antialias:true, antialiasGL:true, roundPixels:false },
  backgroundColor:'#070a12', scene:{ create, update },
});
</script>
</body>
</html>
