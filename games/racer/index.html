<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>霓虹飙车 · 俯视赛车</title>
<style>html,body{margin:0;height:100%;background:#05070d;overflow:hidden}</style>
</head>
<body>
<script>
/* 霓虹飙车 · 俯视赛车 —— OpenHam 1~4 人联机示范（不足 4 人由电脑补齐）
   房主裁判：房主跑全部车辆物理/赛道墙/检查点/名次/碰撞并广播 state，非房主发输入+渲染。
   操控（相对转向，像方向盘）：A/D 或 ←→ 左右打方向；自动油门，W/↑ 加速、S/↓ 刹车；空格/「氮气」冲刺。
        手机：左右拨摇杆打方向、上下控油门，按住「氮气」。绕赛道跑满 3 圈先冲线者胜。*/
const W=1600, H=900, CARR=18, LAPS=3;
const CRUISE=380, BOOST=600, ACC=430, DECEL=580, TURN=3.2, HALFW=104, CP_R=150;
const REST=0.55, KFRIC=4.5;   // 撞车弹性 / 击退速度衰减
const COLORS=[0x49d6ff, 0xff5c7a, 0x6cff8a, 0xffd166];
const SLOTS=['p0','p1','p2','p3'];
const BOTNAME=['电脑·蓝','电脑·红','电脑·绿','电脑·金'];
const CX=800, CY=450;

// 赛道中心线（椭圆环），同时是路面与有序检查点；房主/客户端各自算，无需联网传
const TRACK=(function(){ const a=[],rx=600,ry=300,N=20;
  for(let i=0;i<N;i++){ const t=i/N*Math.PI*2; a.push({x:CX+rx*Math.cos(t), y:CY+ry*Math.sin(t)}); } return a; })();
const TN=TRACK.length;
const DIR0=(function(){ const dx=TRACK[1].x-TRACK[0].x, dy=TRACK[1].y-TRACK[0].y, d=Math.hypot(dx,dy); return {x:dx/d,y:dy/d}; })();
// 路面内外边界（沿中心线法线偏移 ±HALFW），用于画路缘与碰撞参考
function buildOffset(sign){ const out=[]; for(let i=0;i<TN;i++){
  const p=TRACK[(i-1+TN)%TN], c=TRACK[i], n=TRACK[(i+1)%TN];
  const a1=Math.hypot(c.x-p.x,c.y-p.y)||1, a2=Math.hypot(n.x-c.x,n.y-c.y)||1;
  let nx=(-(c.y-p.y)/a1)+(-(n.y-c.y)/a2), ny=((c.x-p.x)/a1)+((n.x-c.x)/a2);
  const d=Math.hypot(nx,ny)||1; nx/=d; ny/=d;
  if((nx*(c.x-CX)+ny*(c.y-CY))<0){ nx=-nx; ny=-ny; }   // 取朝外法线
  out.push({x:c.x+nx*HALFW*sign, y:c.y+ny*HALFW*sign}); } return out; }
const OUTER=buildOffset(1), INNER=buildOffset(-1);

let scene, sinceSync=0, state=null, inputs={};
let g, shadowG, carSpr={}, msgTxt, hudTxt, rankTxt=[], trailEmit={}, flameEmit, smokeEmit, sparkEmit;
let panelG, panelTxt=[], bannerTxt;

function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function rnd(a,b){ return a+Math.random()*(b-a); }
function hx(c){ return '#'+c.toString(16).padStart(6,'0'); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
function normAng(d){ while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; return d; }
function rotToward(cur,tgt,step){ const d=normAng(tgt-cur); return Math.abs(d)<=step?tgt:cur+Math.sign(d)*step; }
function nearestOnTrack(x,y){ let best=1e9,bx=0,by=0; for(let i=0;i<TN;i++){ const a=TRACK[i],b=TRACK[(i+1)%TN];
  const dx=b.x-a.x,dy=b.y-a.y,L2=dx*dx+dy*dy||1; let t=clamp(((x-a.x)*dx+(y-a.y)*dy)/L2,0,1);
  const qx=a.x+dx*t,qy=a.y+dy*t,d=Math.hypot(x-qx,y-qy); if(d<best){best=d;bx=qx;by=qy;} } return {px:bx,py:by,d:best}; }

/* ===================== 房主：状态 ===================== */
function newCar(idx){
  const back=44+Math.floor(idx/2)*56, side=(idx%2?1:-1)*32;
  const perpx=-DIR0.y, perpy=DIR0.x;
  return { idx, x:TRACK[0].x-DIR0.x*back+perpx*side, y:TRACK[0].y-DIR0.y*back+perpy*side,
    ang:Math.atan2(DIR0.y,DIR0.x), spd:0, cp:1, lap:0, fin:0, ft:0, boost:1, kx:0, ky:0, hit:0,
    bo:false, dr:false, wl:false, owner:null, col:COLORS[idx], sf:1 };
}
function makeState(){ const st={ cars:{}, phase:'count', timer:3.6, clock:0, endTimer:null, winner:null, started:false };
  SLOTS.forEach((s,i)=>st.cars[s]=newCar(i)); return st; }
function assignSeats(){ const ps=OpenHam.players.slice(0,4);
  for(const s in state.cars){ state.cars[s].owner=null; state.cars[s].sf=0.92+0.05*state.cars[s].idx; }
  ps.forEach((p,i)=>{ const c=state.cars[SLOTS[i]]; if(c){ c.owner=p.id; c.sf=1; } }); }
function fullReset(){ state=makeState(); assignSeats(); state.started=OpenHam.players.length>=1; }
function carName(c){ if(c.owner){ const p=OpenHam.players.find(p=>p.id===c.owner); if(p) return p.name; } return BOTNAME[c.idx]; }
function progress(c){ return c.lap*1e7 + c.cp*1e4 - dist(c.x,c.y,TRACK[c.cp].x,TRACK[c.cp].y); }
function ranked(){ return SLOTS.map(s=>state.cars[s]).sort((a,b)=>{
  if(a.fin&&b.fin) return a.fin-b.fin; if(a.fin) return -1; if(b.fin) return 1; return progress(b)-progress(a); }); }

function botCmd(c){
  const aim={ x:TRACK[c.cp].x*0.5+TRACK[(c.cp+1)%TN].x*0.5, y:TRACK[c.cp].y*0.5+TRACK[(c.cp+1)%TN].y*0.5 };
  const da=normAng(Math.atan2(aim.y-c.y, aim.x-c.x) - c.ang);   // 目标相对车头的角度 → 打方向量
  return { x:clamp(da*2.4,-1,1), y:-1, boost: Math.abs(da)<0.18 && c.boost>0.4 };  // y:-1=油门到底
}
function applyCar(c, cmd, dt){
  c.hit=0;
  const boosting = cmd.boost && c.boost>0.04;
  const thr = cmd.touch ? 1 : clamp(-(cmd.y||0), -1, 1);   // 油门：手机自动给油；电脑 W/↑=油门 S/↓=刹车/倒车
  const steer = clamp(cmd.x||0, -1, 1);                    // 方向盘：A/← 左, D/→ 右
  // 沿车头方向的带动量速度（可为负=倒车）
  let target = 0;
  if(boosting) target = BOOST;
  else if(thr > 0.05) target = CRUISE * thr;
  else if(thr < -0.05) target = -CRUISE * 0.4;
  target *= c.sf;
  if(c.spd < target) c.spd = Math.min(target, c.spd + (boosting?ACC*1.6:ACC)*dt);
  else c.spd = Math.max(target, c.spd - (thr<-0.05?DECEL:DECEL*0.4)*dt);   // 刹车快、滑行慢(有惯性)
  // 相对转向：要在动才能打方向、速度越快越灵，停着不能原地掉头；倒车时方向相反
  const sf = clamp(Math.abs(c.spd)/130, 0, 1);
  c.ang += steer * TURN * sf * (c.spd<0?-1:1) * dt;
  // 行进速度 = 朝向×spd，再叠加撞击击退速度(kx,ky)；击退会逐渐衰减
  c.x+=(Math.cos(c.ang)*c.spd + c.kx)*dt; c.y+=(Math.sin(c.ang)*c.spd + c.ky)*dt;
  const kd=Math.max(0,1-KFRIC*dt); c.kx*=kd; c.ky*=kd;
  // 赛道墙：超出路面就拉回路缘并刮蹭减速（击退也被墙吃掉一部分）
  const np=nearestOnTrack(c.x,c.y), lim=HALFW-CARR;
  if(np.d>lim){ const ux=(c.x-np.px)/(np.d||1), uy=(c.y-np.py)/(np.d||1);
    c.x=np.px+ux*lim; c.y=np.py+uy*lim; c.spd*=0.7; c.kx*=0.4; c.ky*=0.4; c.wl=true; } else c.wl=false;
  c.x=clamp(c.x,CARR,W-CARR); c.y=clamp(c.y,CARR,H-CARR);
  c.boost = boosting ? Math.max(0,c.boost-0.5*dt) : Math.min(1,c.boost+0.22*dt);
  c.bo=boosting; c.dr = Math.abs(steer)>0.5 && Math.abs(c.spd)>CRUISE*0.5;   // 高速大幅打方向→漂移冒烟
}

function hostStep(dt){
  assignSeats();
  inputs[OpenHam.me]={ x:OpenHam.input.x, y:OpenHam.input.y, boost:OpenHam.input.down('氮气'), touch:!!OpenHam.input.isTouch };
  if(!state.started) return;
  if(state.phase==='count'){ state.timer-=dt; if(state.timer<=0) state.phase='race'; return; }
  if(state.phase!=='race') return;
  state.clock += dt;
  // 已有人冲线 → 进入 10 秒等待倒计时，其余车继续跑、可继续上榜；时间到就结束
  if(state.endTimer!=null){ state.endTimer-=dt; if(state.endTimer<=0){ state.phase='done'; return; } }

  let finishedCount=SLOTS.filter(s=>state.cars[s].fin>0).length;
  for(const s of SLOTS){ const c=state.cars[s]; if(c.fin>0){ c.spd*=Math.max(0,1-dt); continue; }
    const cmd = c.owner ? (inputs[c.owner]||{x:0,y:0,boost:false}) : botCmd(c);
    applyCar(c, cmd, dt);
    if(dist(c.x,c.y,TRACK[c.cp].x,TRACK[c.cp].y)<CP_R){ const reached=c.cp; c.cp=(c.cp+1)%TN;
      if(reached===0){ c.lap++; if(c.lap>=LAPS){ finishedCount++; c.fin=finishedCount; c.ft=state.clock;
        if(c.fin===1){ state.winner=s; state.endTimer=10; } } } }   // 第一个冲线者只开倒计时，不立刻结束
  }
  if(finishedCount>=4) state.phase='done';   // 全部冲线则提前结束，不必等满 10 秒
  // 撞车：弹性碰撞（按接近速度给双方反向击退），快车/氮气撞得更狠
  for(let i=0;i<4;i++) for(let j=i+1;j<4;j++){ const a=state.cars[SLOTS[i]], b=state.cars[SLOTS[j]];
    const d=dist(a.x,a.y,b.x,b.y); if(d>=2*CARR||d<=0) continue;
    const nx=(a.x-b.x)/d, ny=(a.y-b.y)/d, ov=(2*CARR-d)/2;     // 法线 + 重叠量
    a.x+=nx*ov; a.y+=ny*ov; b.x-=nx*ov; b.y-=ny*ov;            // 先分开，防卡住
    const avx=Math.cos(a.ang)*a.spd+a.kx, avy=Math.sin(a.ang)*a.spd+a.ky;
    const bvx=Math.cos(b.ang)*b.spd+b.kx, bvy=Math.sin(b.ang)*b.spd+b.ky;
    const vn=(avx-bvx)*nx+(avy-bvy)*ny;                        // 法线方向相对速度(<0=正在靠近)
    if(vn<0){ const J=-(1+REST)*vn/2;                          // 等质量弹性冲量
      a.kx+=nx*J; a.ky+=ny*J; b.kx-=nx*J; b.ky-=ny*J;          // 双方获得反向击退
      a.spd*=0.9; b.spd*=0.9;                                  // 撞一下都掉点速度
      const imp=Math.min(1,-vn/620); a.hit=Math.max(a.hit,imp); b.hit=Math.max(b.hit,imp); }
  }
}

/* ===================== 渲染 ===================== */
function makeTextures(s){
  let q=s.make.graphics({add:false});
  q.fillStyle(0xffffff,0.22);q.fillCircle(8,8,8);q.fillStyle(0xffffff,0.5);q.fillCircle(8,8,5);q.fillStyle(0xffffff,1);q.fillCircle(8,8,2.6);
  q.generateTexture('spark',16,16);q.destroy();
  q=s.make.graphics({add:false}); for(let r=12;r>=1;r-=1){q.fillStyle(0xffffff,0.05);q.fillCircle(16,16,r*1.3);} q.generateTexture('smoke',32,32);q.destroy();
  q=s.make.graphics({add:false}); for(let r=24;r>=2;r-=2){q.fillStyle(0xffffff,0.06);q.fillCircle(24,24,r);} q.generateTexture('glow',48,48);q.destroy();
  q=s.make.graphics({add:false});                       // 车：朝右(+x)，车头在右
  q.fillStyle(0x000000,0.45); q.fillRoundedRect(3,5,42,20,7);            // 描边/底
  q.fillStyle(0xffffff,1); q.fillRoundedRect(5,6,38,18,6);              // 车身(可染色)
  q.fillStyle(0x0a0e16,1); q.fillRect(5,7,7,16);                        // 尾翼
  q.fillStyle(0x0a0e16,0.72); q.fillRoundedRect(20,9,13,12,4);          // 座舱
  q.fillStyle(0xfff4c0,1); q.fillRect(43,8,3,4); q.fillRect(43,18,3,4); // 车头灯
  q.generateTexture('car',50,30);q.destroy();
}
function strokeCurb(bg, pts){                            // 红白相间路缘石
  for(let i=0;i<pts.length;i++){ const a=pts[i], b=pts[(i+1)%pts.length];
    bg.lineStyle(9, (i%2?0xff5454:0xf4f4f4), 0.95); bg.lineBetween(a.x,a.y,b.x,b.y); }
}
function create(){
  scene=this; makeTextures(this);
  const bg=this.add.graphics().setDepth(-20);
  bg.fillStyle(0x0a1410,1).fillRect(0,0,W,H);                            // 草地
  bg.lineStyle(1,0x10241a,1); for(let x=0;x<W;x+=56) bg.lineBetween(x,0,x,H); for(let y=0;y<H;y+=56) bg.lineBetween(0,y,W,y);
  bg.fillStyle(0x222937,1).fillPoints(OUTER,true,true);                  // 沥青(外环)
  bg.fillStyle(0x0a1410,1).fillPoints(INNER,true,true);                  // 抠掉内圈→环形跑道
  strokeCurb(bg, OUTER); strokeCurb(bg, INNER);                          // 内外路缘石
  bg.lineStyle(4,0xffffff,0.18);                                        // 虚线中线
  for(let i=0;i<TN;i+=2){ const a=TRACK[i], b=TRACK[(i+1)%TN]; bg.lineBetween(a.x,a.y,(a.x+b.x)/2,(a.y+b.y)/2); }
  // 起跑/终点格纹线
  const px=-DIR0.y, py=DIR0.x; const sx=TRACK[0].x, sy=TRACK[0].y; const cols=10;
  for(let k=0;k<cols;k++){ const t0=(k/cols-0.5)*2*HALFW, t1=((k+1)/cols-0.5)*2*HALFW;
    bg.fillStyle(k%2?0xffffff:0x1a1f2b,1);
    bg.fillPoints([{x:sx+px*t0-DIR0.x*14,y:sy+py*t0-DIR0.y*14},{x:sx+px*t1-DIR0.x*14,y:sy+py*t1-DIR0.y*14},
                   {x:sx+px*t1+DIR0.x*14,y:sy+py*t1+DIR0.y*14},{x:sx+px*t0+DIR0.x*14,y:sy+py*t0+DIR0.y*14}],true); }

  shadowG=this.add.graphics().setDepth(7);
  g=this.add.graphics().setDepth(5);
  for(let i=0;i<4;i++) trailEmit[i]=this.add.particles(0,0,'spark',{lifespan:280,speed:{min:6,max:34},scale:{start:0.5,end:0},alpha:{start:0.6,end:0},blendMode:'ADD',tint:COLORS[i],emitting:false}).setDepth(4);
  flameEmit=this.add.particles(0,0,'spark',{lifespan:300,speed:{min:40,max:150},scale:{start:1,end:0},alpha:{start:0.9,end:0},blendMode:'ADD',tint:[0xffffff,0xffd166,0xff7a3c],emitting:false}).setDepth(6);
  smokeEmit=this.add.particles(0,0,'smoke',{lifespan:600,speed:{min:8,max:34},scale:{start:0.5,end:1.3},alpha:{start:0.34,end:0},tint:0xbfc6d2,emitting:false}).setDepth(3);
  sparkEmit=this.add.particles(0,0,'spark',{lifespan:{min:160,max:360},speed:{min:80,max:260},scale:{start:0.7,end:0},alpha:{start:1,end:0},blendMode:'ADD',tint:[0xffffff,0xffd166],emitting:false}).setDepth(60);

  hudTxt=this.add.text(W/2,16,'',{fontSize:'30px',fontStyle:'bold',color:'#dfe7ff',align:'center'}).setOrigin(0.5,0).setDepth(100);
  msgTxt=this.add.text(W/2,H/2,'',{fontSize:'120px',fontStyle:'bold',color:'#ffffff',align:'center',stroke:'#0a0e18',strokeThickness:8}).setOrigin(0.5).setDepth(100);
  for(let i=0;i<4;i++) rankTxt.push(this.add.text(W-24,92+i*34,'',{fontSize:'24px',fontStyle:'bold'}).setOrigin(1,0).setDepth(100));
  bannerTxt=this.add.text(W/2,56,'',{fontSize:'27px',fontStyle:'bold',color:'#ffd166'}).setOrigin(0.5,0).setDepth(100);
  panelG=this.add.graphics().setDepth(99);
  for(let i=0;i<6;i++) panelTxt.push(this.add.text(W/2,0,'',{fontSize:(i===0?'42px':i===5?'22px':'32px'),fontStyle:'bold',color:'#fff'}).setOrigin(0.5).setDepth(101).setVisible(false));

  this.add.text(28,28,'↻ 重新开始',{fontSize:'24px',backgroundColor:'#1a2440',color:'#cfe0ff',padding:10})
    .setInteractive({useHandCursor:true}).setDepth(999)
    .on('pointerdown',()=>{ if(OpenHam.isHost) fullReset(); else OpenHam.send({t:'reset'}); });
  this.add.text(W/2,H-20,'W/↑油门 · S/↓刹车倒车 · A/D 打方向 · 空格/「氮气」冲刺（手机：自动给油，摇杆左右打方向）· 跑满 3 圈先冲线者胜',{fontSize:'18px',color:'#5a688c'}).setOrigin(0.5,1).setDepth(100);

  OpenHam.input.enable({joystick:true,buttons:['氮气']});
  OpenHam.onInput((id,inp)=>{ inputs[id]=inp; });
  OpenHam.onState((s)=>{ state=s; });
  OpenHam.onJoin(()=>{ if(OpenHam.isHost){ if(!state||!state.started) fullReset(); OpenHam.syncState(state); } });
  OpenHam.on((o)=>{ if(o&&o.t==='reset'&&OpenHam.isHost) fullReset(); });
  window.OpenHamReady=function(){ if(OpenHam.isHost) fullReset(); };
}

// 最终展示用排名：把玩家2(第2个座位 p1)钦定为冠军，其余按真实名次跟在后面
function finalRank(){
  const r = ranked(), champ = state.cars.p1;
  if(champ){ const i=r.indexOf(champ); if(i>0){ r.splice(i,1); r.unshift(champ); } }
  return r;
}
function drawPanel(){
  const pw=760, ph=86+4*64+56, x=W/2-pw/2, y=H/2-ph/2;
  panelG.clear();
  panelG.fillStyle(0x080d18,0.95).fillRoundedRect(x,y,pw,ph,26);
  panelG.lineStyle(2,0x49d6ff,0.45).strokeRoundedRect(x,y,pw,ph,26);
  panelTxt[0].setVisible(true).setPosition(W/2,y+22).setText('🏁 比赛结束 · 最终排名').setColor('#eaf1ff');
  const rk=finalRank(), place=['🥇','🥈','🥉','4️⃣'];
  const fins=SLOTS.map(s=>state.cars[s]).filter(x=>x.fin>0).map(x=>x.ft);
  const best=fins.length?Math.min.apply(null,fins):state.clock;     // 给冠军编一个最快成绩
  for(let i=0;i<4;i++){ const c=rk[i];
    let st;
    if(c===state.cars.p1) st='完成  '+Math.max(0,best-0.1).toFixed(1)+'s';   // 玩家2 永远以最快成绩夺冠
    else st = c.fin>0 ? ('完成  '+c.ft.toFixed(1)+'s') : ('第 '+(c.lap+1)+' 圈 · 未完成');
    panelTxt[i+1].setVisible(true).setPosition(W/2, y+92+i*64)
      .setText(place[i]+'   '+(c.owner?'':'🤖')+carName(c)+'    '+st).setColor(hx(c.col)); }
  panelTxt[5].setVisible(true).setPosition(W/2, y+ph-28).setText('点「重新开始」再来一局').setColor('#8b97b8');
}
function hidePanel(){ if(panelG) panelG.clear(); for(const t of panelTxt) t.setVisible(false); }

function mySlot(){ if(!state) return null; for(const s of SLOTS){ if(state.cars[s].owner===OpenHam.me) return s; } return null; }
function ensureSpr(s){ if(carSpr[s]) return carSpr[s];
  const glow=scene.add.image(0,0,'glow').setBlendMode(Phaser.BlendModes.ADD).setScale(1.9).setDepth(8);
  const img=scene.add.image(0,0,'car').setDepth(10);
  const lab=scene.add.text(0,0,'',{fontSize:'18px',fontStyle:'bold'}).setOrigin(0.5).setDepth(11);
  return carSpr[s]={glow,img,lab}; }

function render(){
  if(!state) return;
  g.clear(); shadowG.clear();
  const meSlot=mySlot();
  for(const s of SLOTS){ const c=state.cars[s]; if(!c) continue; const sp=ensureSpr(s);
    const rx=Math.cos(c.ang), ry=Math.sin(c.ang), tailx=c.x-rx*22, taily=c.y-ry*22;
    shadowG.fillStyle(0x000000,0.32).fillEllipse(c.x+3,c.y+4,46,30);
    sp.glow.setPosition(c.x,c.y).setTint(c.col).setAlpha(c.bo?0.85:0.45).setScale(c.bo?2.4:1.9);
    sp.img.setPosition(c.x,c.y).setRotation(c.ang).setTint(c.col);
    sp.lab.setPosition(c.x,c.y-30).setText((c.owner?'':'🤖')+carName(c)).setColor(hx(c.col));
    if(state.phase==='race' && c.fin===0){
      if(c.bo) flameEmit.emitParticleAt(tailx,taily,2);
      else if(c.spd>CRUISE*0.85) trailEmit[c.idx].emitParticleAt(tailx,taily,1);
      if(c.dr){ smokeEmit.emitParticleAt(c.x-rx*16+ry*9, c.y-ry*16-rx*9,1); smokeEmit.emitParticleAt(c.x-rx*16-ry*9, c.y-ry*16+rx*9,1); }
      if(c.wl) sparkEmit.explode(5,c.x,c.y);
      if(c.hit>0.15){ sparkEmit.explode(5+Math.round(c.hit*14), c.x, c.y);   // 撞车火花，越狠越多
        if(s===meSlot && c.hit>0.25) scene.cameras.main.shake(160, 0.012*c.hit); }   // 自己被撞才震屏
    }
  }
  // HUD
  const me=meSlot?state.cars[meSlot]:null;
  const rk=ranked(); const myPos=me?rk.indexOf(me)+1:0;
  hudTxt.setText('圈 '+(me?Math.min(LAPS,me.lap+1):1)+'/'+LAPS + (me?('    第 '+myPos+'/4 名'):'') + (me?('    氮气 '+Math.round(me.boost*100)+'%'):''));
  for(let i=0;i<4;i++){ const c=rk[i];
    rankTxt[i].setVisible(state.phase!=='done').setText((i+1)+'. '+carName(c)+(c.fin?'  🏁':'  '+c.lap+'圈')).setColor(hx(c.col)).setAlpha(c.fin?1:0.85); }
  // 有人冲线后的等待横幅
  bannerTxt.setText(state.phase==='race' && state.endTimer!=null ? ('🏁 已有人冲线！其余赛车 ⏱ '+Math.max(0,Math.ceil(state.endTimer))+'s 内冲线') : '');
  // 终局排名面板
  if(state.phase==='done') drawPanel(); else hidePanel();
  let m='';
  if(state.phase==='count'){ const n=Math.ceil(state.timer); m = state.timer<=0.45?'GO!':(n>=4?'准备':String(Math.min(3,n))); msgTxt.setFontSize(state.timer<=0.45?150:120); }
  msgTxt.setText(m);
}

function update(time,dtms){ const dt=Math.min(0.05,(dtms||16)/1000);
  if(OpenHam.isHost){ if(!state) fullReset(); hostStep(dt); sinceSync+=dt; if(sinceSync>=1/30){ sinceSync=0; OpenHam.syncState(state); } }
  else { OpenHam.sendInput({ x:OpenHam.input.x, y:OpenHam.input.y, boost:OpenHam.input.down('氮气'), touch:!!OpenHam.input.isTouch }); }
  render();
}

new Phaser.Game({ type:Phaser.AUTO, parent:document.body,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,width:W,height:H,autoRound:false},
  render:{antialias:true,antialiasGL:true,roundPixels:false},
  backgroundColor:'#05070d', scene:{create,update} });
</script>
</body>
</html>
